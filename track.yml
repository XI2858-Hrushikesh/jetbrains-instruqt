title: Get Started with JetBrains IntelliJ IDEA
teaser: Run IntelliJ IDEA Community in a browser-based sandbox — no install, no account.
  Open a Python project, use smart Intention Actions to fix and implement code, then
  refactor with Shift+F6 and step through the debugger.
description: |-
  Run IntelliJ IDEA Community Edition in a browser-based sandbox and experience developer productivity hands-on. Open a Python project, run it from the IDE, use Intention Actions (Alt+Enter) to implement a function from a comment and add docstrings, then rename a parameter consistently across a function using Shift+F6 refactoring, set a breakpoint, and step through execution in the debugger. No local install, no JetBrains account, no sign-up required.
